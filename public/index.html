<!DOCTYPE html>
<html>
<head>
<title>Secure Login</title>
<style>
body {
font-family: Arial;
background: #f2f2f2;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
}
.box {
background: white;
padding: 20px;
width: 300px;
border-radius: 6px;
}
input, button {
width: 100%;
padding: 8px;
margin-top: 10px;
}
button {
background: #2563eb;
color: white;
  border: none;
}
</style>
</head>
<body>
<div class="box">
<h3>Login</h3>
<form method="POST" action="/login">
<input name="username"
placeholder="Username" required />
<input name="password" type="password"
placeholder="Password" required />
<button type="submit">Sign In</button>
</form>
</div>
</body>
</html>
